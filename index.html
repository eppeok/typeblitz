<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TypeBlitz ⌨️</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#111;--border:#1e1e1e;
  --dim:#3a3a3a;--sub:#6b6b6b;--text:#d1d5db;
  --correct:#e2e8f0;--wrong:#ca3e3e;--wrong-bg:#2a1010;
  --cursor:#e2b714;--accent:#e2b714;--green:#22c55e;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}

/* NAV */
nav{width:100%;max-width:900px;display:flex;align-items:center;justify-content:space-between;padding:16px 0 32px;flex-wrap:wrap;gap:12px}
.logo{font-size:22px;font-weight:900;color:var(--accent);letter-spacing:-1px}
.logo span{color:var(--sub);font-weight:400}
.nav-links{display:flex;gap:8px}
.nav-link{padding:7px 16px;border-radius:8px;border:none;background:transparent;color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;transition:color .15s}
.nav-link:hover,.nav-link.active{color:var(--text)}

/* SCREENS */
.screen{display:none;width:100%;max-width:900px;flex-direction:column;align-items:center}
.screen.active{display:flex}

/* CONFIG BAR */
.config-bar{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:6px;margin-bottom:40px;flex-wrap:wrap;justify-content:center}
.cfg-group{display:flex;gap:2px;padding:0 8px;border-right:1px solid var(--border)}
.cfg-group:last-child{border-right:none}
.cfg-btn{padding:6px 14px;border:none;background:transparent;color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;border-radius:7px;transition:all .15s}
.cfg-btn:hover{color:var(--text)}
.cfg-btn.active{background:var(--border);color:var(--accent)}
.cfg-sep{width:1px;background:var(--border);margin:0 4px}

/* STAT BAR */
.stat-bar{display:flex;gap:32px;margin-bottom:20px;min-height:44px;align-items:center;width:100%;max-width:760px}
.stat{text-align:center}
.stat-val{font-size:28px;font-weight:900;color:var(--accent);line-height:1;font-variant-numeric:tabular-nums}
.stat-lbl{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.stat-bar .timer-val{font-size:40px}

/* TYPING AREA */
.typing-wrap{position:relative;width:100%;max-width:760px;margin-bottom:24px}
#word-display{
  font-family:'Courier New',Courier,monospace;
  font-size:clamp(18px,2.5vw,24px);
  line-height:1.8;
  color:var(--dim);
  word-break:break-word;
  user-select:none;
  position:relative;
  max-height:130px;overflow:hidden;
  transition:opacity .1s;
}
#word-display .char{position:relative;transition:color .05s}
#word-display .char.correct{color:var(--correct)}
#word-display .char.wrong{color:var(--wrong);background:var(--wrong-bg);border-radius:2px}
#word-display .char.extra{color:var(--wrong);text-decoration:underline}
#word-display .word.wrong-word .char:not(.correct){color:var(--wrong)}
.cursor-line{
  display:inline-block;width:2px;height:1.1em;
  background:var(--accent);vertical-align:text-bottom;
  animation:blink .6s step-end infinite;position:relative;
  margin-right:-2px;border-radius:1px
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Hidden real input */
#hidden-input{
  position:absolute;top:0;left:0;width:100%;height:100%;
  opacity:0;pointer-events:none;font-size:1px;
}

/* RESTART HINT */
.restart-hint{font-size:12px;color:var(--dim);text-align:center;margin-top:4px}
.restart-hint kbd{background:var(--border);border:1px solid var(--dim);border-radius:4px;padding:2px 7px;font-size:11px;color:var(--sub)}

/* CARET OVERLAY */
.caret{position:absolute;width:2px;background:var(--accent);border-radius:1px;pointer-events:none;transition:left .05s,top .05s;animation:blink .6s step-end infinite}

/* RESULTS */
.result-wrap{width:100%;max-width:760px;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.result-big{display:flex;gap:40px;margin-bottom:32px;flex-wrap:wrap;justify-content:center}
.result-stat{text-align:center;background:var(--surface);border-radius:16px;padding:24px 32px;border:1px solid var(--border);min-width:120px}
.result-stat .r-val{font-size:52px;font-weight:900;color:var(--accent);line-height:1;font-variant-numeric:tabular-nums}
.result-stat .r-lbl{font-size:12px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-top:6px}
.result-stat.pb-card .r-val{color:var(--green)}

.result-breakdown{background:var(--surface);border-radius:16px;padding:20px 24px;border:1px solid var(--border);margin-bottom:20px;width:100%}
.result-breakdown h3{font-size:13px;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:16px}
.breakdown-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px}
.breakdown-row:last-child{border-bottom:none}
.breakdown-row .bd-lbl{color:var(--sub)}
.breakdown-row .bd-val{font-weight:700;color:var(--text)}

/* WPM graph */
#wpm-graph{width:100%;height:100px;border-radius:8px;background:var(--bg)}

/* LEADERBOARD */
.lb-wrap{width:100%;max-width:700px}
.lb-row{display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--surface);border-radius:12px;margin-bottom:8px;border:1px solid var(--border);animation:fadeUp .3s ease both}
.lb-row .lb-rank{font-size:20px;font-weight:900;min-width:36px;text-align:center}
.lb-row .lb-name{flex:1;font-weight:700}
.lb-row .lb-wpm{font-size:18px;font-weight:900;color:var(--accent)}
.lb-row .lb-acc{font-size:12px;color:var(--sub)}
.lb-row .lb-mode{font-size:11px;color:var(--border);background:var(--dim);padding:2px 8px;border-radius:20px;color:var(--sub)}
.lb-row.my-row{border-color:var(--accent)}
.pb-banner{background:linear-gradient(135deg,#2a2000,#1a1500);border:2px solid var(--accent);border-radius:14px;padding:16px 24px;text-align:center;margin-bottom:20px;animation:fadeUp .3s ease}
.pb-banner h2{color:var(--accent);font-size:20px;margin-bottom:4px}
.pb-banner p{color:var(--sub);font-size:13px}

/* BUTTONS */
.btn{padding:12px 28px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-accent{background:var(--accent);color:#0d0d0d}
.btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--sub)}
.btn-sm{padding:8px 18px;font-size:13px;border-radius:8px}

/* Custom text */
.custom-area{width:100%;max-width:760px;margin-bottom:16px}
.custom-area textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px;font-size:14px;resize:vertical;min-height:80px;outline:none;font-family:inherit}
.custom-area textarea:focus{border-color:var(--accent)}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:1000;transition:transform .25s;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .result-big{gap:12px}.result-stat{padding:16px 20px}
  .result-stat .r-val{font-size:36px}.stat-val{font-size:20px}
  #word-display{font-size:16px}
}
</style>
</head>

</div>

<!-- ══ RESULTS SCREEN ══ -->
<div id="results-screen" class="screen">
  <div class="result-wrap">
    <div id="pb-banner" class="pb-banner" style="display:none">

const WORDS = {

const QUOTES = [

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let cfg = { mode:'words', wordCount:25, timeSec:30, diff:'easy' };
let test = {
  text:'', words:[], charEls:[], wordEls:[],
  charIdx:0, wordIdx:0,
  correctChars:0, totalTyped:0, errors:0,
  startTime:null, endTime:null, timerInterval:null,
  wpmInterval:null, wpmHistory:[],
  status:'idle', // idle | typing | done
  lastResult:null
};
let currentQuote = null;

// ══════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════
function toast(msg,dur=2000){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

function switchTab(tab, el){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l=>l.classList.remove('active'));
  document.getElementById(tab+'-screen').classList.add('active');
  if(el) el.classList.add('active');
  else {
    document.querySelectorAll('.nav-link').forEach(l=>{ if(l.textContent.toLowerCase().includes(tab)) l.classList.add('active'); });
  }
  if(tab==='leaderboard') loadLB('all');
}

// ══════════════════════════════════════
// CONFIG
// ══════════════════════════════════════
function setMode(m, el){
  cfg.mode=m;
  document.querySelectorAll('.cfg-group:first-child .cfg-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('time-opts').style.display=m==='time'?'flex':'none';
  document.getElementById('word-opts').style.display=(m==='words'||m==='easy'||m==='medium'||m==='hard')?'flex':'none';
  document.getElementById('diff-opts').style.display=(m==='words'||m==='time')?'flex':'none';
  document.getElementById('custom-area').style.display=m==='custom'?'flex':'none';
  document.getElementById('custom-area').style.flexDirection='column';
  document.getElementById('timer-stat').style.display=m==='time'?'flex':'none';
  if(m!=='custom') newTest();
}

function setTimeSec(s,el){ cfg.timeSec=s; _activateInGroup(el); newTest(); }
function setWordCount(n,el){ cfg.wordCount=n; _activateInGroup(el); newTest(); }
function setDiff(d,el){ cfg.diff=d; _activateInGroup(el); newTest(); }

function _activateInGroup(el){
  el.closest('.cfg-group')?.querySelectorAll('.cfg-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function startCustom(){
  const txt=document.getElementById('custom-text-inp').value.trim();
  if(!txt){ toast('Paste some text first'); return; }
  buildTest(txt);
}

// ══════════════════════════════════════
// BUILD TEST
// ══════════════════════════════════════
function generateText(){
  if(cfg.mode==='quote'){
    currentQuote=QUOTES[Math.floor(Math.random()*QUOTES.length)];
    return currentQuote.text;
  }
  const pool=WORDS[cfg.diff]||WORDS.easy;
  const shuffled=[...pool].sort(()=>Math.random()-.5);
  const count=cfg.mode==='time'?200:cfg.wordCount;
  const result=[];
  while(result.length<count) result.push(...shuffled);
  return result.slice(0,count).join(' ');
}

function buildTest(text){
  // Reset state
  clearTimers();
  test = {
    text, words:text.split(' '), charEls:[], wordEls:[],
    charIdx:0, wordIdx:0, correctChars:0, totalTyped:0, errors:0,
    startTime:null, endTime:null, timerInterval:null, wpmInterval:null,
    wpmHistory:[], status:'idle', lastResult:null
  };

  const display=document.getElementById('word-display');
  display.innerHTML='';
  const cursorEl=document.createElement('span');
  cursorEl.className='cursor-line';
  cursorEl.id='cursor-el';

  let globalCharIdx=0;
  test.words.forEach((word,wi)=>{
    const wordEl=document.createElement('span');
    wordEl.className='word';
    wordEl.dataset.wi=wi;

    // chars of the word
    for(const ch of word){
      const span=document.createElement('span');
      span.className='char';
      span.textContent=ch;
      span.dataset.idx=globalCharIdx;
      test.charEls.push(span);
      wordEl.appendChild(span);
      globalCharIdx++;
    }
    // space after word (except last)
    if(wi<test.words.length-1){
      const sp=document.createElement('span');
      sp.className='char space';
      sp.textContent=' ';
      sp.dataset.idx=globalCharIdx;
      test.charEls.push(sp);
      wordEl.appendChild(sp);
      globalCharIdx++;
    }
    test.wordEls.push(wordEl);
    display.appendChild(wordEl);
  });

  // Place cursor before first char
  if(test.charEls.length>0){
    test.charEls[0].parentNode.insertBefore(cursorEl, test.charEls[0]);
  }

  updateLiveStats();
  document.getElementById('live-timer').textContent=cfg.timeSec;
  document.getElementById('hidden-input').value='';
  focusInput();
}

function newTest(){ buildTest(generateText()); }
function restartTest(){ buildTest(test.text); }

// ══════════════════════════════════════
// INPUT HANDLING
// ══════════════════════════════════════
function focusInput(){
  document.getElementById('hidden-input').focus();
}

document.getElementById('hidden-input').addEventListener('keydown', e=>{
  if(test.status==='done') return;
  if(e.key==='Tab'){ e.preventDefault(); restartTest(); return; }
  if(test.status==='idle' && e.key.length===1) startTyping();
});

document.getElementById('hidden-input').addEventListener('input', e=>{
  if(test.status==='done') return;
  const inp=e.target;
  const key=inp.value;
  inp.value='';
  if(!key) return;
  if(test.status==='idle') startTyping();
  handleChar(key);
});

document.addEventListener('keydown',e=>{
  if(e.key==='Tab'){ e.preventDefault(); }
  if(document.getElementById('type-screen').classList.contains('active') && !e.ctrlKey && !e.metaKey){
    focusInput();
  }
});

function startTyping(){
  test.status='typing';
  test.startTime=Date.now();

  // WPM sampling every second
  test.wpmInterval=setInterval(()=>{
    const wpm=calcWPM();
    test.wpmHistory.push(Math.round(wpm));
    updateLiveStats();
  },1000);

  // Countdown timer for timed mode
  if(cfg.mode==='time'){
    let left=cfg.timeSec;
    document.getElementById('live-timer').textContent=left;
    test.timerInterval=setInterval(()=>{
      left--;
      document.getElementById('live-timer').textContent=left;
      if(left<=0){ clearInterval(test.timerInterval); finishTest(); }
    },1000);
  }
}

function handleChar(ch){
  if(test.charIdx>=test.charEls.length){
    if(cfg.mode!=='time') finishTest();
    return;
  }

  const expected=test.charEls[test.charIdx].textContent;
  const charEl=test.charEls[test.charIdx];

  test.totalTyped++;
  if(ch===expected){
    charEl.className='char'+(charEl.classList.contains('space')?' space':'')+' correct';
    test.correctChars++;
  } else {
    charEl.className='char'+(charEl.classList.contains('space')?' space':'')+' wrong';
    test.errors++;
  }

  test.charIdx++;
  updateLiveStats();

  // Move cursor
  const cursor=document.getElementById('cursor-el');
  if(cursor){
    if(test.charIdx<test.charEls.length){
      const next=test.charEls[test.charIdx];
      next.parentNode.insertBefore(cursor,next);
    } else {
      // end of text
      const last=test.charEls[test.charEls.length-1];
      last.parentNode.insertBefore(cursor, last.nextSibling);
      if(cfg.mode!=='time') finishTest();
    }
  }

  // Scroll keeping cursor visible
  scrollToCursor();
}

function scrollToCursor(){
  const cursor=document.getElementById('cursor-el');
  const display=document.getElementById('word-display');
  if(!cursor||!display) return;
  const cTop=cursor.offsetTop;
  const dHeight=display.clientHeight;
  // If cursor is in line 3+, scroll up
  if(cTop>display.clientHeight*0.55){
    // Shift words up by hiding top lines
    display.style.marginTop='-'+(cTop-40)+'px';
  }
}

// ══════════════════════════════════════
// CALCULATIONS
// ══════════════════════════════════════
function calcWPM(){
  if(!test.startTime) return 0;
  const mins=(Date.now()-test.startTime)/60000;
  if(mins===0) return 0;
  return (test.correctChars/5)/mins;
}

function calcAcc(){
  if(test.totalTyped===0) return 100;
  return Math.round((test.correctChars/test.totalTyped)*100);
}

function updateLiveStats(){
  const wpm=Math.round(calcWPM());
  const acc=calcAcc();
  document.getElementById('live-wpm').textContent=test.startTime?wpm:'-';
  document.getElementById('live-acc').textContent=test.startTime?acc+'%':'-';
}

// ══════════════════════════════════════
// FINISH
// ══════════════════════════════════════
function finishTest(){
  if(test.status==='done') return;
  test.status='done';
  test.endTime=Date.now();
  clearTimers();

  const elapsed=(test.endTime-test.startTime)/1000;
  const wpm=Math.round(calcWPM());
  const acc=calcAcc();

  test.lastResult={wpm,acc,elapsed,errors:test.errors,correct:test.correctChars,chars:test.totalTyped,
    mode:cfg.mode==='time'?cfg.timeSec+'s':cfg.mode==='quote'?'quote':'words-'+cfg.wordCount,
    diff:cfg.diff, wpmHistory:[...test.wpmHistory,wpm]};

  showResults(test.lastResult);
}

function clearTimers(){
  if(test.timerInterval){ clearInterval(test.timerInterval); test.timerInterval=null; }
  if(test.wpmInterval){ clearInterval(test.wpmInterval); test.wpmInterval=null; }
}

// ══════════════════════════════════════
// RESULTS SCREEN
// ══════════════════════════════════════
function showResults(r){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('results-screen').classList.add('active');

  document.getElementById('r-wpm').textContent=r.wpm;
  document.getElementById('r-acc').textContent=r.acc+'%';
  document.getElementById('r-chars').textContent=r.chars;
  document.getElementById('r-correct').textContent=r.correct;
  document.getElementById('r-errors').textContent=r.errors;
  document.getElementById('r-time').textContent=r.elapsed.toFixed(1)+'s';
  document.getElementById('r-mode').textContent=r.mode+(r.diff&&r.mode!=='quote'?' · '+r.diff:'');

  // Personal best
  const pbKey='tb_pb_'+r.mode;
  const prevPB=parseInt(localStorage.getItem(pbKey)||'0');
  const isPB=r.wpm>prevPB;
  if(isPB) localStorage.setItem(pbKey,r.wpm);
  document.getElementById('pb-banner').style.display=isPB&&prevPB>0?'block':'none';
  if(isPB&&prevPB>0) document.getElementById('pb-msg').textContent=`${r.wpm} WPM beats your previous best of ${prevPB} WPM!`;
  const pbCard=document.getElementById('r-pb-card');
  if(prevPB>0){ pbCard.style.display='block'; document.getElementById('r-pb').textContent=Math.max(r.wpm,prevPB); }
  else pbCard.style.display='none';

  drawWPMGraph(r.wpmHistory);
}

function drawWPMGraph(history){
  const canvas=document.getElementById('wpm-graph');
  const ctx=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth||700;
  canvas.height=100;
  if(!history.length){ ctx.clearRect(0,0,canvas.width,canvas.height); return; }
  const max=Math.max(...history,1);
  const w=canvas.width, h=canvas.height;
  ctx.clearRect(0,0,w,h);
  // Grid lines
  ctx.strokeStyle='#1e1e1e'; ctx.lineWidth=1;
  [0.25,0.5,0.75,1].forEach(f=>{
    ctx.beginPath(); ctx.moveTo(0,h-f*h); ctx.lineTo(w,h-f*h); ctx.stroke();
  });
  // WPM line
  const step=w/(history.length-1||1);
  ctx.beginPath();
  history.forEach((v,i)=>{
    const x=i*step, y=h-((v/max)*h*0.9+h*0.05);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#e2b714'; ctx.lineWidth=2; ctx.stroke();
  // Fill under
  ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
  ctx.fillStyle='rgba(226,183,20,0.08)'; ctx.fill();
  // Dots
  history.forEach((v,i)=>{
    const x=i*step, y=h-((v/max)*h*0.9+h*0.05);
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle='#e2b714'; ctx.fill();
  });
}

// ══════════════════════════════════════
// LEADERBOARD
// ══════════════════════════════════════
async function saveToLeaderboard(){
  const r=test.lastResult;
  if(!r){ toast('No result to save'); return; }
  const name=prompt('Enter your name for the leaderboard (max 16 chars):','');
  if(!name?.trim()){ return; }
  const trimmed=name.trim().slice(0,16);
  try{
    await db.ref('typeblitz/scores').push({
      name:trimmed, wpm:r.wpm, acc:r.acc, mode:r.mode,
      diff:r.diff||'', timestamp:firebase.database.ServerValue.TIMESTAMP
    });
    toast('🏆 Score saved!');
    switchTab('leaderboard');
  }catch(e){ toast('❌ Could not save — check internet'); }
}

let _lbFilter='all';
async function loadLB(filter, el){
  _lbFilter=filter;
  document.querySelectorAll('#leaderboard-screen .cfg-btn').forEach(b=>b.classList.remove('active'));
  if(el) el.classList.add('active');
  const list=document.getElementById('lb-list');
  list.innerHTML='<div style="color:var(--sub);text-align:center;padding:40px">Loading...</div>';
  try{
    const snap=await db.ref('typeblitz/scores').orderByChild('wpm').limitToLast(50).once('value');
    const raw=snap.val()||{};
    let scores=Object.entries(raw).map(([k,v])=>({...v,key:k}));
    if(filter==='30') scores=scores.filter(s=>s.mode==='30s');
    else if(filter==='60') scores=scores.filter(s=>s.mode==='60s');
    else if(filter==='words') scores=scores.filter(s=>s.mode?.startsWith('words'));
    scores.sort((a,b)=>b.wpm-a.wpm);
    if(!scores.length){ list.innerHTML='<div style="color:var(--sub);text-align:center;padding:40px">No scores yet for this filter!</div>'; return; }
    const medals=['🥇','🥈','🥉'];
    list.innerHTML=scores.slice(0,20).map((s,i)=>`
      <div class="lb-row" style="animation-delay:${i*0.04}s">
        <div class="lb-rank">${medals[i]||('#'+(i+1))}</div>
        <div class="lb-name">${escHtml(s.name||'Anonymous')}</div>
        <div class="lb-mode">${escHtml(s.mode||'')}</div>
        <div class="lb-acc">${s.acc}% acc</div>
        <div class="lb-wpm">${s.wpm} <span style="font-size:12px;color:var(--sub)">wpm</span></div>
      </div>`).join('');
  }catch(e){ list.innerHTML='<div style="color:var(--sub);text-align:center;padding:40px">Could not load leaderboard</div>'; }
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
newTest();
document.getElementById('word-display').addEventListener('click',focusInput);
</script>
